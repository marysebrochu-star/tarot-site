<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">

<title>Tarot Oui Non | Arcana Oracle</title>

<meta name="description" content="Posez votre question et recevez une réponse immédiate du tarot oui non avec Arcana Oracle.">

<style>

body{
background:#0b0f1a;
color:white;
font-family:serif;
text-align:center;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
color:#d4af37;
font-size:40px;
}

input{
padding:12px;
width:70%;
font-size:18px;
border-radius:6px;
border:none;
margin-top:20px;
}

button{
background:#d4af37;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

.result{
font-size:40px;
margin-top:40px;
color:#d4af37;
}

img{
max-width:250px;
border-radius:12px;
box-shadow:0 0 20px gold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Tarot Oui / Non</h1>

<p>
Posez une question au tarot et laissez les arcanes vous guider.
</p>

<input id="question" placeholder="Écrivez votre question ici...">

<br>

<button onclick="tarotYesNo()">Consulter le tarot</button>

<div class="result" id="answer"></div>

<img id="card-image">

<br><br>

<a href="/success.html?product=small">
<button>Faire un tirage complet</button>
</a>

</div>

<script>

const answers = [
{result:"OUI", image:"/images/tarot/le-soleil.webp"},
{result:"OUI", image:"/images/tarot/le-monde.webp"},
{result:"OUI", image:"/images/tarot/la-force.webp"},
{result:"NON", image:"/images/tarot/la-lune.webp"},
{result:"NON", image:"/images/tarot/le-diable.webp"},
{result:"NON", image:"/images/tarot/la-maison-dieu.webp"},
{result:"PEUT-ÊTRE", image:"/images/tarot/l-hermite.webp"},
{result:"PEUT-ÊTRE", image:"/images/tarot/temperance.webp"}
];

function tarotYesNo(){

let question=document.getElementById("question").value;

if(question===""){
alert("Veuillez poser une question.");
return;
}

let random=answers[Math.floor(Math.random()*answers.length)];

document.getElementById("answer").textContent=random.result;
document.getElementById("card-image").src=random.image;

}

</script>

</body>
</html>
