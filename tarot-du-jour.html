<div class="container">

<h1>Tarot du Jour</h1>

<p class="intro">
Chaque journée porte une énergie particulière. Grâce au tarot du jour,

  <h2>Pourquoi consulter le tarot du jour ?</h2>

  <p>
  Le tarot du jour permet de recevoir une guidance simple et immédiate.

<script>
const dailyCards = [
  {
    name: "Le Bateleur",
    image: "/images/tarot/le-bateleur.webp",
    message: "Aujourd’hui, une nouvelle opportunité se présente à vous. Osez commencer, même si tout n’est pas encore parfaitement en place."
  },
  {
    name: "La Force",
    image: "/images/tarot/la-force.webp",
    message: "Votre plus grande puissance aujourd’hui sera votre calme intérieur. La patience et la maîtrise vous ouvriront la bonne voie."
  },
  {
    name: "La Lune",
    image: "/images/tarot/la-lune.webp",
    message: "Votre intuition est très active aujourd’hui. Prenez le temps d’écouter vos ressentis avant de prendre une décision."
  },
  {
    name: "Le Soleil",
    image: "/images/tarot/le-soleil.webp",
    message: "Une énergie lumineuse vous accompagne aujourd’hui. La clarté, la joie et la confiance peuvent transformer votre journée."
  },
  {
    name: "Le Monde",
    image: "/images/tarot/le-monde.webp",
    message: "Vous approchez d’un accomplissement important. Ce que vous avez construit prend une forme plus complète et harmonieuse."
  },
  {
    name: "La Justice",
    image: "/images/tarot/la-justice.webp",
    message: "Aujourd’hui, la vérité et l’équilibre seront essentiels. Prenez vos décisions avec lucidité et honnêteté."
  },
  {
    name: "L’Étoile",
    image: "/images/tarot/l-etoile.webp",
    message: "L’espoir, la douceur et la confiance vous accompagnent aujourd’hui. Laissez la lumière guider vos choix."
  }
];

function drawDailyCard(){
  const today = new Date().toDateString();
  let seed = 0;

  for(let i = 0; i < today.length; i++){
    seed += today.charCodeAt(i);
  }

  const index = seed % dailyCards.length;
  const card = dailyCards[index];

  document.getElementById("card-name").textContent = card.name;
  document.getElementById("card-image").src = card.image;
  document.getElementById("card-image").alt = card.name;
  document.getElementById("card-message").textContent = card.message;

const pageURL = window.location.href;
const text = "Découvrez votre tarot du jour sur Arcana Oracle ✨";

document.getElementById("share-facebook").href =
  "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(pageURL);

document.getElementById("share-twitter").href =
  "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text) + "&url=" + encodeURIComponent(pageURL);

document.getElementById("share-whatsapp").href =
  "https://wa.me/?text=" + encodeURIComponent(text + " " + pageURL);
}

drawDailyCard();
</script>
