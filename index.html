<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arcana Oracle</title>

<style>

body{
background:#0b0b0f;
color:#f5f5f5;
font-family: Georgia, serif;
text-align:center;
padding:60px;
}

h1{
font-size:60px;
letter-spacing:4px;
color:#d4af37;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.symbol{
font-size:40px;
margin-bottom:20px;
color:#d4af37;
}

button{
background:#d4af37;
color:black;
border:none;
padding:16px 28px;
font-size:18px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#f0d36b;
transform:scale(1.05);
}

.cards{
margin-top:60px;
opacity:0.5;
font-size:14px;
}

</style>
</head>

<body>

<div class="symbol">
☾ ✦ ☽
</div>

<h1>Arcana Oracle</h1>

<div class="subtitle">
Tarot divinatoire — révélations et guidance
</div>

<button onclick="startDraw()">
Commencer votre tirage
</button>

<div class="cards">
Passé • Présent • Futur
</div>

<script>

function startDraw(){

const drawId = Math.floor(Math.random()*100000)

window.location.href = "/draw.html?id="+drawId

}

</script>

</body>
</html>
