<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Arcana Oracle — Votre tirage</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;500;600&display=swap');

    :root{
      --bg:#07080d;
      --panel:#11131a;
      --gold:#d4af37;
      --text:#f6f1e8;
      --muted:#c7bba3;
      --line:rgba(212,175,55,0.28);
      --shadow:0 0 24px rgba(212,175,55,0.12);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.08), transparent 30%),
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04), transparent 16%),
        linear-gradient(180deg, #090a10 0%, #05060a 100%);
      color:var(--text);
      font-family:'Cormorant Garamond', serif;
      padding:40px 20px 60px;
    }
    .meaning{
font-size:18px;
margin-top:8px;
color:#ddd;
}


    .container{
      max-width:1200px;
      margin:0 auto;
      text-align:center;
    }

    .symbol{
      color:var(--gold);
      font-size:30px;
      letter-spacing:8px;
      margin-bottom:10px;
      opacity:0.95;
    }

    h1{
      margin:0 0 10px;
      font-family:'Cinzel', serif;
      font-size:46px;
      font-weight:600;
      color:var(--gold);
      letter-spacing:2px;
    }

    .subtitle{
      color:var(--muted);
      font-size:24px;
      margin-bottom:34px;
    }
    .shuffle-zone{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  margin:10px 0 34px;
  min-height:390px;
}

.shuffle-card{
  width:180px;
  height:300px;
  border-radius:18px;
  border:1px solid rgba(212,175,55,0.28);
  background:
    radial-gradient(circle at center, rgba(212,175,55,0.18), transparent 45%),
    linear-gradient(180deg, #121521 0%, #0d1018 100%);
  box-shadow:0 0 24px rgba(212,175,55,0.12);
  position:relative;
  transform-origin:center center;
}

.shuffle-card::before{
  content:"☾ ✦ ☽";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gold);
  font-family:'Cinzel', serif;
  font-size:34px;
  letter-spacing:4px;
}

.shuffle-1{
  animation:shuffleLeft 1.2s ease-in-out infinite;
}
.shuffle-2{
  animation:shuffleCenter 1.2s ease-in-out infinite;
}
.shuffle-3{
  animation:shuffleRight 1.2s ease-in-out infinite;
}

@keyframes shuffleLeft{
  0%{transform:translateX(0) rotate(-6deg);}
  25%{transform:translateX(18px) rotate(-10deg);}
  50%{transform:translateX(6px) rotate(-3deg);}
  75%{transform:translateX(22px) rotate(-8deg);}
  100%{transform:translateX(0) rotate(-6deg);}
}

@keyframes shuffleCenter{
  0%{transform:translateY(0) rotate(0deg);}
  25%{transform:translateY(-10px) rotate(2deg);}
  50%{transform:translateY(0) rotate(0deg);}
  75%{transform:translateY(-8px) rotate(-2deg);}
  100%{transform:translateY(0) rotate(0deg);}
}

@keyframes shuffleRight{
  0%{transform:translateX(0) rotate(6deg);}
  25%{transform:translateX(-18px) rotate(10deg);}
  50%{transform:translateX(-6px) rotate(3deg);}
  75%{transform:translateX(-22px) rotate(8deg);}
  100%{transform:translateX(0) rotate(6deg);}
}

    .cards{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:26px;
      flex-wrap:wrap;
      perspective:1400px;
      margin-bottom:40px;
      min-height:420px;
    }

    .card-slot{
      width:260px;
      display:flex;
      flex-direction:column;
      align-items:center;
      opacity:0;
      transform:translateY(18px);
      transition:opacity .7s ease, transform .7s ease;
    }

    .card-slot.show{
      opacity:1;
      transform:translateY(0);
    }

    .card-3d{
      width:230px;
      height:380px;
      perspective:1200px;
    }

    .card-inner{
      position:relative;
      width:100%;
      height:100%;
      transform-style:preserve-3d;
      transition:transform 1.15s ease;
    }

    .card-slot.flipped .card-inner{
      transform:rotateY(180deg);
    }

    .card-face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      background:var(--panel);
    }
.card{
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
}

    .card-back{
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at center, rgba(212,175,55,0.18), transparent 45%),
        linear-gradient(180deg, #121521 0%, #0d1018 100%);
      color:var(--gold);
      font-family:'Cinzel', serif;
      font-size:22px;
      letter-spacing:3px;
    }

    .card-back::before{
      content:"☾ ✦ ☽";
      font-size:34px;
      opacity:0.9;
    }

    .card-front{
      transform:rotateY(180deg);
      background:#fff;
    }

    .card-front img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#fff;
    }

    .card-front img.reversed{
      transform:rotate(180deg);
    }

    .card-meta{
      margin-top:16px;
      background:rgba(17,19,26,0.86);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px 12px;
      width:100%;
      box-shadow:var(--shadow);
    }

    .position{
      color:var(--gold);
      font-family:'Cinzel', serif;
      font-size:15px;
      letter-spacing:1px;
      margin-bottom:6px;
      text-transform:uppercase;
    }

    .card-name{
      font-size:30px;
      color:var(--text);
      margin-bottom:4px;
      font-weight:600;
    }

    .orientation{
      font-size:18px;
      color:var(--muted);
    }

    .summary{
      max-width:900px;
      margin:10px auto 0;
      text-align:left;
      white-space:pre-wrap;
      background:rgba(17,19,26,0.92);
      border:1px solid var(--line);
      border-radius:20px;
      padding:26px 28px;
      box-shadow:var(--shadow);
      font-size:24px;
      line-height:1.45;
      color:var(--text);
      opacity:0;
      transform:translateY(14px);
      transition:opacity .8s ease, transform .8s ease;
    }

    .summary.show{
      opacity:1;
      transform:translateY(0);
    }

    .loading{
      color:var(--muted);
      font-size:24px;
      margin-top:20px;
    }

    .error{
      max-width:900px;
      margin:20px auto 0;
      background:rgba(90,20,20,0.28);
      border:1px solid rgba(255,120,120,0.35);
      border-radius:14px;
      padding:18px 20px;
      color:#ffd6d6;
      text-align:left;
      font-size:22px;
    }

    @media (max-width: 768px){
      body{padding:24px 14px 40px}
      h1{font-size:34px}
      .subtitle{font-size:20px}
      .card-3d{width:220px;height:360px}
      .summary{font-size:21px;padding:22px}
    }
    .shuffle-zone{
display:flex;
justify-content:center;
align-items:center;
gap:18px;
margin:30px 0;
min-height:320px;
}

.shuffle-card{
width:160px;
height:260px;
border-radius:18px;
border:1px solid rgba(212,175,55,0.28);
background:
radial-gradient(circle at center, rgba(212,175,55,0.18), transparent 45%),
linear-gradient(180deg, #121521 0%, #0d1018 100%);
box-shadow:0 0 24px rgba(212,175,55,0.12);
position:relative;
transform-origin:center center;
}

.shuffle-card::before{
content:"☾ ✦ ☽";
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
color:#d4af37;
font-size:32px;
letter-spacing:4px;
}

.shuffle-1{
animation:shuffleLeft 1.2s ease-in-out infinite;
}

.shuffle-2{
animation:shuffleCenter 1.2s ease-in-out infinite;
}

.shuffle-3{
animation:shuffleRight 1.2s ease-in-out infinite;
}

@keyframes shuffleLeft{
0%{transform:translateX(0) rotate(-6deg);}
25%{transform:translateX(18px) rotate(-10deg);}
50%{transform:translateX(6px) rotate(-3deg);}
75%{transform:translateX(22px) rotate(-8deg);}
100%{transform:translateX(0) rotate(-6deg);}
}

@keyframes shuffleCenter{
0%{transform:translateY(0) rotate(0deg);}
25%{transform:translateY(-10px) rotate(2deg);}
50%{transform:translateY(0) rotate(0deg);}
75%{transform:translateY(-8px) rotate(-2deg);}
100%{transform:translateY(0) rotate(0deg);}
}

@keyframes shuffleRight{
0%{transform:translateX(0) rotate(6deg);}
25%{transform:translateX(-18px) rotate(10deg);}
50%{transform:translateX(-6px) rotate(3deg);}
75%{transform:translateX(-22px) rotate(8deg);}
100%{transform:translateX(0) rotate(6deg);}
}
  </style>
</head>
<body>
  <div class="container">
    <div class="symbol">☾ ✦ ☽</div>
    <h1>ARCANA ORACLE</h1>
    <div class="subtitle">Votre tirage mystique</div>

    <div id="shuffle-zone" class="shuffle-zone">
  <div class="shuffle-card shuffle-1"></div>
  <div class="shuffle-card shuffle-2"></div>
  <div class="shuffle-card shuffle-3"></div>
</div>

<div id="cards" class="cards"></div>

<div id="loading" class="loading">Les cartes se mélangent…</div>
    <div id="summary" class="summary"></div>
    <div id="error" class="error" style="display:none;"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://aibagvvujcyrstrarztf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpYmFndnZ1amN5cnN0cmFyenRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTMwNTMsImV4cCI6MjA4ODEyOTA1M30.bPKnLW0y8xFp9ZjqGjWhIvhD95eq2rMK6f-M-zn4K8A"
    );

    const POSITION_LABELS = {
      1: "Passé",
      2: "Présent",
      3: "Futur"
    };

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showError(message){
      const error = document.getElementById("error");
      error.style.display = "block";
      error.textContent = message;
    }

function hideShuffleAndShowCards(){
  const shuffleZone = document.getElementById("shuffle-zone");
  if(shuffleZone){
    shuffleZone.style.display = "none";
  }

  const cards = document.querySelectorAll(".card");
  cards.forEach((card, index) => {
    setTimeout(() => {
      card.style.opacity = "1";
      card.style.transform = "translateY(0)";
    }, index * 500);
  });
}

    function createCardElement(item){
      const card = Array.isArray(item.cards) ? item.cards[0] : item.cards;
      const slot = document.createElement("div");
      slot.className = "card-slot";

      const positionLabel = POSITION_LABELS[item.position_index] || `Position ${item.position_index}`;
      const orientationLabel = item.orientation === "upright" ? "Droit" : "Renversé";
      const imgClass = item.orientation === "reversed" ? "reversed" : "";

      slot.innerHTML = `
        <div class="card-3d">
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">
              <img src="/${card.image_path}" alt="${card.name}" class="${imgClass}">
            </div>
          </div>
        </div>
        <div class="card-meta">
          <div class="position">${positionLabel}</div>
          <div class="card-name">${card.name}</div>
          <div class="orientation">${orientationLabel}</div>
        </div>
      `;
      const meaning =
item.orientation === "upright"
? card.meaning_upright
: card.meaning_reversed;

div.innerHTML = `
  <img src="/${card.image_path}" alt="${card.name}">
  <h3>${card.name}</h3>
  <div class="orientation">${item.orientation === "upright" ? "Droit" : "Renversé"}</div>
  <p class="meaning">${meaning}</p>
`;


      return slot;
    }

   async function animateCards(cards){
  const cardsContainer = document.getElementById("cards");
  const shuffleZone = document.getElementById("shuffle-zone");
  const loading = document.getElementById("loading");

  await sleep(2200);

  shuffleZone.style.display = "none";
  loading.textContent = "Les cartes se dévoilent…";

  for (const item of cards){
    const card = Array.isArray(item.cards) ? item.cards[0] : item.cards;
    if (!card) continue;

    const element = createCardElement(item);
    cardsContainer.appendChild(element);

    await sleep(120);
    element.classList.add("show");

    await sleep(650);
    element.classList.add("flipped");

    await sleep(420);
  }
}

    async function loadDraw() {
      const summary = document.getElementById("summary");
      const loading = document.getElementById("loading");
      const params = new URLSearchParams(window.location.search);
      const drawId = params.get("id");

      if (!drawId) {
        showError("Aucun tirage trouvé.");
        loading.style.display = "none";
        return;
      }
      setTimeout(() => {
  hideShuffleAndShowCards();
}, 2500);

      const { data: draw, error: drawError } = await supabase
        .from("draws")
        .select("id, summary, created_at")
        .eq("id", drawId)
        .maybeSingle();

      if (drawError) {
        showError("Erreur tirage : " + drawError.message);
        loading.style.display = "none";
        return;
      }

      if (!draw) {
        showError("Aucun tirage trouvé.");
        loading.style.display = "none";
        return;
      }

      const { data: cards, error: cardsError } = await supabase
        .from("draw_cards")
        .select(`
          position_index,
          orientation,
          card_id,
          cards:card_id (
            name,
            image_path
          )
        `)
        .eq("draw_id", drawId)
        .order("position_index", { ascending: true });

      if (cardsError) {
        showError("Erreur cartes : " + cardsError.message);
        loading.style.display = "none";
        return;
      }

      if (!cards || cards.length === 0) {
        showError("Aucune carte trouvée pour ce tirage.");
        loading.style.display = "none";
        return;
      }

      await animateCards(cards);

      loading.style.display = "none";
      summary.textContent = draw.summary || "Votre tirage est en préparation. Rechargez la page dans quelques secondes.";
      summary.classList.add("show");
    }

    loadDraw();
  </script>
</body>
</html>
