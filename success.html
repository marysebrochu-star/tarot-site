<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Paiement confirmé</title>
</head>
<body>
  <h1>Paiement confirmé ✅</h1>
  <p id="message">Nous préparons votre tirage...</p>

 <script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// 🔒 Protection simple (anti accès direct)
if (!document.referrer.includes("stripe") && !document.referrer.includes("paypal")) {
    window.location.href = "/";
}
    const supabase = createClient(
      "https://aibagvvujcyrstrarztf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpYmFndnZ1amN5cnN0cmFyenRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTMwNTMsImV4cCI6MjA4ODEyOTA1M30.bPKnLW0y8xFp9ZjqGjWhIvhD95eq2rMK6f-M-zn4K8A"
 );

async function run() {
  const message = document.getElementById("message");

  try {
    const params = new URLSearchParams(window.location.search);
    const product = params.get("product");

    if (!product) {
      message.textContent = "Erreur : produit manquant.";
      return;
    }

    const { data: drawId, error } = await supabase.rpc("create_draw_after_payment", {
      p_product_code: product
    });

    if (error) {
      message.textContent = "Erreur : " + error.message;
      return;
    }

    if (!drawId) {
      message.textContent = "Erreur : tirage non créé.";
      return;
    }

    message.textContent = "Tirage prêt...";

    window.location.href = "/draw.html?id=" + drawId;

  } catch (e) {
    message.textContent = "Erreur : " + e.message;
  }
}

run();
</script>    
</body>
</html>
