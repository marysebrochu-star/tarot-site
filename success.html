<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Paiement confirmé</title>
  <style>
    body {
      background:#0b0b0f;
      color:#f5f5f5;
      font-family:Georgia, serif;
      text-align:center;
      padding:60px 20px;
      margin:0;
    }

    h1 {
      color:#d4af37;
      margin-bottom:20px;
    }

    #message {
      font-size:20px;
      opacity:0.9;
    }
  </style>
</head>
<body>
  <h1>Paiement confirmé ✅</h1>
  <p id="message">Nous préparons votre tirage...</p>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    if (!document.referrer.includes("stripe") && !document.referrer.includes("paypal")) {
      window.location.href = "/";
    }

    const supabase = createClient(
      "https://aibagvvujcyrstrarztf.supabase.co",
      "TA_CLE_ANON_ICI"
    );

    async function run() {
      const message = document.getElementById("message");

      try {
        const params = new URLSearchParams(window.location.search);
        const product = params.get("product");

        if (!product) {
          message.textContent = "Erreur : produit manquant.";
          return;
        }

        const { data: drawId, error } = await supabase.rpc("create_draw_after_payment", {
          p_product_code: product
        });

        if (error) {
          message.textContent = "Erreur : " + error.message;
          return;
        }

        if (!drawId) {
          message.textContent = "Erreur : tirage non créé.";
          return;
        }

        message.textContent = "Tirage prêt...";
        window.location.href = "/draw.html?id=" + drawId;

      } catch (e) {
        message.textContent = "Erreur : " + e.message;
      }
    }

    run();
  </script>
</body>
</html>
