<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Paiement confirmé</title>
  <style>
    body {
      background:#0b0b0f;
      color:#f5f5f5;
      font-family:Georgia, serif;
      text-align:center;
      padding:60px 20px;
      margin:0;
    }

    h1 {
      color:#d4af37;
      margin-bottom:20px;
    }

    #message {
      font-size:20px;
      margin-top:20px;
    }
  </style>
</head>
<body>
  <h1>Paiement confirmé ✅</h1>
  <p id="message">Nous préparons votre tirage...</p>

  <script>
    async function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function run() {
      const message = document.getElementById("message");
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      if (!sessionId) {
        message.textContent = "Erreur : session_id manquant.";
        return;
      }

      for (let i = 0; i < 10; i++) {
        try {
          const res = await fetch(`/api/get-draw?session_id=${encodeURIComponent(sessionId)}`);
          const data = await res.json();

          if (res.ok && data.draw_id) {
            message.textContent = "Tirage prêt...";
            window.location.href = `/draw.html?id=${encodeURIComponent(data.draw_id)}`;
            return;
          }

          message.textContent = "Paiement reçu. Préparation du tirage...";
        } catch (e) {
          message.textContent = "Préparation du tirage...";
        }

        await wait(1500);
      }

      message.textContent = "Le paiement est reçu, mais le tirage prend un peu plus de temps. Rechargez cette page dans quelques secondes.";
    }

    run();
  </script>
</body>
</html>
