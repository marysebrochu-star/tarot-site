<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Paiement confirmé</title>
</head>
<body>
  <h1>Paiement confirmé ✅</h1>
  <p id="message">Nous préparons votre tirage...</p>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://aibagvvujcyrstrarztf.supabase.co",
      "TA_CLE_ANON_PUBLIC_ICI"
    );

    async function run() {
      const message = document.getElementById("message");

      try {
        const params = new URLSearchParams(window.location.search);
        const product = params.get("product");

        if (!product) {
          message.textContent = "Erreur : produit manquant dans l’URL.";
          return;
        }

        const { data: drawId, error } = await supabase.rpc("create_draw_after_payment", {
          p_product_code: product
        });

        if (error) {
          message.textContent = "Erreur création tirage : " + error.message;
          return;
        }

        if (!drawId) {
          message.textContent = "Erreur : aucun identifiant de tirage retourné.";
          return;
        }

        message.textContent = "Tirage créé. Redirection...";
        window.location.href = "/draw.html?id=" + drawId;
      } catch (e) {
        message.textContent = "Erreur inattendue : " + (e.message || e);
      }
    }

    run();
  </script>
</body>
</html>
